<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analog Clock</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%230d0d1a' stroke='%23a78bfa' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='1.5' fill='%23a78bfa'/%3E%3Cline x1='16' y1='16' x2='16' y2='6' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='16' y1='16' x2='22' y2='16' stroke='%23a78bfa' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-left">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
        <line x1="12" y1="12" x2="12" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="12" y1="12" x2="17" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="header-title">Analog Clock</span>
    </div>

    <div class="header-controls">
      <!-- 12/24h toggle -->
      <button class="pill-btn" id="toggleHour" title="Toggle 12/24h">12h</button>

      <!-- Timezone selector -->
      <select id="tzSelect" class="tz-select" title="Timezone">
        <option value="local">Local</option>
        <option value="America/New_York">New York</option>
        <option value="America/Los_Angeles">Los Angeles</option>
        <option value="Europe/London">London</option>
        <option value="Europe/Paris">Paris</option>
        <option value="Asia/Dubai">Dubai</option>
        <option value="Asia/Karachi">Karachi</option>
        <option value="Asia/Kolkata">Mumbai</option>
        <option value="Asia/Tokyo">Tokyo</option>
        <option value="Australia/Sydney">Sydney</option>
      </select>

      <!-- Theme switcher -->
      <div class="theme-switcher">
        <button class="theme-dot active" data-theme="midnight" title="Midnight" style="--c:#a78bfa"></button>
        <button class="theme-dot" data-theme="ocean"    title="Ocean"    style="--c:#38bdf8"></button>
        <button class="theme-dot" data-theme="sunset"   title="Sunset"   style="--c:#fb923c"></button>
        <button class="theme-dot" data-theme="forest"   title="Forest"   style="--c:#4ade80"></button>
        <button class="theme-dot" data-theme="rose"     title="Rose"     style="--c:#f472b6"></button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main>
    <!-- Clock -->
    <div class="clock-wrap">
      <svg id="clockSVG" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="faceBg" cx="50%" cy="40%" r="65%">
            <stop offset="0%"   stop-color="var(--face-light)"/>
            <stop offset="100%" stop-color="var(--face-dark)"/>
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="handGlow">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Outer ring -->
        <circle cx="150" cy="150" r="148" fill="var(--ring-outer)" />
        <circle cx="150" cy="150" r="143" fill="var(--ring-inner)" />

        <!-- Face -->
        <circle cx="150" cy="150" r="138" fill="url(#faceBg)" />

        <!-- Tick marks -->
        <g id="ticks"></g>

        <!-- Hour numbers -->
        <g id="numbers" font-family="Inter, sans-serif" text-anchor="middle" dominant-baseline="central"></g>

        <!-- Hour hand -->
        <g id="hourHand" style="transform-origin:150px 150px">
          <rect x="146.5" y="72" width="7" height="78" rx="3.5"
                fill="var(--hand-hour)" filter="url(#handGlow)" />
          <rect x="147.5" y="73" width="5" height="76" rx="2.5"
                fill="var(--hand-highlight)" opacity="0.35" />
        </g>

        <!-- Minute hand -->
        <g id="minuteHand" style="transform-origin:150px 150px">
          <rect x="147.5" y="48" width="5" height="102" rx="2.5"
                fill="var(--hand-minute)" filter="url(#handGlow)" />
          <rect x="148.5" y="49" width="3" height="100" rx="1.5"
                fill="var(--hand-highlight)" opacity="0.3" />
        </g>

        <!-- Second hand -->
        <g id="secondHand" style="transform-origin:150px 150px">
          <!-- tail -->
          <rect x="149.2" y="155" width="1.6" height="28" rx="0.8" fill="var(--accent)" />
          <!-- needle -->
          <rect x="149.2" y="42"  width="1.6" height="113" rx="0.8" fill="var(--accent)" filter="url(#handGlow)" />
        </g>

        <!-- Center cap -->
        <circle cx="150" cy="150" r="6.5" fill="var(--ring-outer)" />
        <circle cx="150" cy="150" r="4.5" fill="var(--accent)" />
        <circle cx="150" cy="150" r="2"   fill="white" opacity="0.6" />
      </svg>
    </div>

    <!-- Digital info panel -->
    <div class="info-panel">
      <div id="digitalTime" class="digital-time">00:00:00</div>
      <div id="dateDisplay" class="date-display">Monday, Jan 1, 2025</div>
      <div id="tzLabel" class="tz-label">Local Time</div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
