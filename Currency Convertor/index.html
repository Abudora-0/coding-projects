<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeCurrency — Currency Converter</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav>
        <div class="logo">
            <img src="logo.svg" alt="DeCurrency Logo">
            <span>DeCurrency</span>
        </div>
        <a href="../index.html" class="back-btn"><i class="fas fa-arrow-left"></i> All Projects</a>
    </nav>

    <main>
        <div class="hero">
            <h1><i class="fas fa-coins"></i> Currency Converter</h1>
            <p>Convert any amount to all major world currencies in real time.</p>
        </div>

        <div class="card converter-card">
            <div class="api-notice">
                <i class="fas fa-info-circle"></i>
                <span>Add your free API key from <a href="https://currencyapi.com" target="_blank">currencyapi.com</a> in <code>script.js</code> to enable live rates.</span>
            </div>

            <form id="converterForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="quantity"><i class="fas fa-hashtag"></i> Amount</label>
                        <input type="number" id="quantity" name="quantity" min="1" value="1" placeholder="e.g. 100" required>
                    </div>
                    <div class="form-group">
                        <label for="currency"><i class="fas fa-flag"></i> Base Currency</label>
                        <select id="currency" name="currency">
                            <option value="PKR">🇵🇰 Pakistani Rupee (PKR)</option>
                            <option value="USD">🇺🇸 US Dollar (USD)</option>
                            <option value="INR">🇮🇳 Indian Rupee (INR)</option>
                            <option value="EUR">🇪🇺 Euro (EUR)</option>
                            <option value="GBP">🇬🇧 British Pound (GBP)</option>
                            <option value="JPY">🇯🇵 Japanese Yen (JPY)</option>
                            <option value="CNY">🇨🇳 Chinese Yuan (CNY)</option>
                            <option value="KRW">🇰🇷 South Korean Won (KRW)</option>
                            <option value="AED">🇦🇪 UAE Dirham (AED)</option>
                            <option value="QAR">🇶🇦 Qatari Riyal (QAR)</option>
                            <option value="SAR">🇸🇦 Saudi Riyal (SAR)</option>
                            <option value="CAD">🇨🇦 Canadian Dollar (CAD)</option>
                            <option value="AUD">🇦🇺 Australian Dollar (AUD)</option>
                        </select>
                    </div>
                </div>
                <button class="btn" type="submit">
                    <i class="fas fa-exchange-alt"></i> Convert
                </button>
            </form>
        </div>

        <div class="output" id="output">
            <div class="output-header">
                <h2><i class="fas fa-table"></i> Conversion Results</h2>
                <span id="outputMeta"></span>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Currency</th>
                            <th>Code</th>
                            <th>Value</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; DeCurrency &mdash; Powered by <a href="https://currencyapi.com" target="_blank">CurrencyAPI</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
