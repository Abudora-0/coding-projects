<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="FilmFinder — discover, save, and explore movies powered by TMDB." />
  <meta name="theme-color" content="#6366f1" />
  <title>FilmFinder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236366f1' stroke-width='2'><rect x='2' y='2' width='20' height='20' rx='2.18' ry='2.18'/><line x1='7' y1='2' x2='7' y2='22'/><line x1='17' y1='2' x2='17' y2='22'/><line x1='2' y1='12' x2='22' y2='12'/><line x1='2' y1='7' x2='7' y2='7'/><line x1='17' y1='7' x2='22' y2='7'/><line x1='17' y1='17' x2='22' y2='17'/><line x1='2' y1='17' x2='7' y2='17'/></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── Navbar ──────────────────────────────── -->
<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="#" class="nav-logo" id="logoBtn">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-svg"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="2" y1="17" x2="7" y2="17"/></svg>
      <span>FilmFinder</span>
    </a>

    <div class="nav-tabs" id="navTabs">
      <button class="nav-tab active" data-category="trending">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        Trending
      </button>
      <button class="nav-tab" data-category="popular">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Popular
      </button>
      <button class="nav-tab" data-category="top_rated">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Top Rated
      </button>
      <button class="nav-tab" data-category="upcoming">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Upcoming
      </button>
    </div>

    <div class="nav-actions">
      <!-- Search (desktop inline) -->
      <div class="nav-search" id="navSearch">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ns-icon"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search movies…" autocomplete="off" />
        <button class="ns-clear hidden" id="searchClear">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <!-- Surprise Me -->
      <button class="nav-icon-btn" id="surpriseBtn" title="Surprise Me">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 8h.01"/><path d="M8 8h.01"/><path d="M8 16h.01"/><path d="M16 16h.01"/><path d="M12 12h.01"/></svg>
      </button>

      <!-- Watchlist -->
      <button class="nav-icon-btn" id="watchlistBtn" title="Watchlist">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <span class="nb" id="watchlistCount">0</span>
      </button>

      <!-- Favorites -->
      <button class="nav-icon-btn" id="favoritesBtn" title="Favorites">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span class="nb" id="favCount">0</span>
      </button>

      <!-- Hamburger -->
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <!-- Mobile nav tabs -->
  <div class="mobile-tabs hidden" id="mobileTabs">
    <button class="nav-tab active" data-category="trending">Trending</button>
    <button class="nav-tab" data-category="popular">Popular</button>
    <button class="nav-tab" data-category="top_rated">Top Rated</button>
    <button class="nav-tab" data-category="upcoming">Upcoming</button>
  </div>
</nav>

<!-- ── Cinematic Hero ─────────────────────── -->
<section class="hero" id="hero">
  <div class="hero-backdrop" id="heroBg"></div>
  <div class="hero-grad"></div>
  <div class="hero-body" id="heroBody">
    <!-- populated by JS -->
  </div>
</section>

<!-- ── Genre + Sort strip ─────────────────── -->
<div class="controls-strip" id="controlsStrip">
  <div class="genre-chips" id="genreChips">
    <button class="genre-chip active" data-genre="">All</button>
    <!-- populated by JS -->
  </div>
  <div class="sort-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="7" y2="18"/></svg>
    <select class="sort-select" id="sortSelect">
      <option value="popularity.desc">Most Popular</option>
      <option value="vote_average.desc">Highest Rated</option>
      <option value="release_date.desc">Newest First</option>
      <option value="release_date.asc">Oldest First</option>
    </select>
  </div>
</div>

<!-- ── Loading ────────────────────────────── -->
<div class="loader" id="loader">
  <div class="loader-ring"></div>
  <p>Loading…</p>
</div>

<!-- ── Main ───────────────────────────────── -->
<main id="main">
  <div class="section-row" id="sectionRow">
    <h2 class="section-title" id="sectionTitle">Trending This Week</h2>
    <span class="result-count" id="resultCount"></span>
  </div>

  <div class="movie-grid" id="movieGrid"></div>

  <!-- No results -->
  <div class="no-results hidden" id="noResults">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
    <h3>No movies found</h3>
    <p>Try different keywords or filters</p>
  </div>

  <!-- Load more -->
  <div class="load-more-wrap" id="loadMoreWrap">
    <button class="load-more-btn" id="loadMoreBtn">
      Load More
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
  </div>
</main>

<!-- ── Movie Detail Modal ──────────────────── -->
<div class="modal hidden" id="detailModal">
  <div class="modal-bg" id="detailModalBg"></div>
  <div class="modal-box detail-box" id="detailBox">
    <div class="modal-topbar">
      <button class="modal-icon-btn" id="detailFavBtn" title="Favourite">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ico-heart"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <button class="modal-icon-btn" id="detailWLBtn" title="Add to Watchlist">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ico-bookmark"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="modal-close" id="detailClose">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

<!-- ── Watchlist Modal ────────────────────── -->
<div class="modal hidden" id="watchlistModal">
  <div class="modal-bg" id="wlModalBg"></div>
  <div class="modal-box list-box">
    <div class="modal-topbar">
      <h3 class="modal-list-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        Watchlist
      </h3>
      <button class="modal-close" id="wlClose">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="watchlistGrid" class="list-grid"></div>
    <div class="list-empty hidden" id="wlEmpty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <p>Your watchlist is empty</p>
    </div>
  </div>
</div>

<!-- ── Favorites Modal ────────────────────── -->
<div class="modal hidden" id="favoritesModal">
  <div class="modal-bg" id="favModalBg"></div>
  <div class="modal-box list-box">
    <div class="modal-topbar">
      <h3 class="modal-list-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Favourites
      </h3>
      <button class="modal-close" id="favClose">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="favoritesGrid" class="list-grid"></div>
    <div class="list-empty hidden" id="favEmpty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <p>No favourites yet</p>
    </div>
  </div>
</div>

<!-- ── Toast ──────────────────────────────── -->
<div id="toastWrap" class="toast-wrap"></div>

<!-- ── Scroll Top ─────────────────────────── -->
<button id="scrollTop" class="scroll-top" aria-label="Back to top">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<!-- ── Footer ─────────────────────────────── -->
<footer class="footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="2" y1="17" x2="7" y2="17"/></svg>
      <span>FilmFinder</span>
    </div>
    <p>Data provided by <a href="https://www.themoviedb.org/" target="_blank" rel="noopener">TMDB</a> · © 2026 FilmFinder</p>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
