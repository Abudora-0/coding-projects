<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styleform.css">

</head>
<body>
    <div>
        <h1>Contact Form</h1>
        <p id="pi">Please Fill all the Text in the Fields.</p>   
    </div>
    <form action="">
        <p class="name">
            Your Name:<br>
            <input type="text" placeholder="Enter Full Name">
        </p>
        <p class="email">
            Your Email:<br>
            <input type="email" name="email" id="" placeholder="Enter Your Email">
        </p>
        <p class="number">
            Your  Mobile Number:<br>
            <input type="text" placeholder="Enter Your Mobile Number">
        </p>
        <p class="message">
            Your Message to us:<br>
            <textarea name="message" id="" cols="50" rows="5" placeholder="Enter Your Query here"></textarea>

        </p>
        <p>Select how you want to update:
            <select name="select"  id="">
                <option value="Choose">--Please Choose One Option--</option>
                <option value="op1">Message</option>
                <option value="op2">Call</option>
                <option value="op3">Email</option>
            </select>
        </p>
        <input type="submit" value="submit">
        <input type="reset" value="reset">
     
    </form>
   
</body>
</html>
