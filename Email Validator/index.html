<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeValidator — Email Validator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav>
        <div class="logo">
            <img src="img/logo.svg" alt="DeValidator Logo">
            <span>DeValidator</span>
        </div>
        <a href="../index.html" class="back-btn"><i class="fas fa-arrow-left"></i> All Projects</a>
    </nav>

    <main>
        <div class="hero">
            <h1><i class="fas fa-envelope-circle-check"></i> Email Validator</h1>
            <p>Check if an email address is valid, deliverable, and not disposable.</p>
        </div>

        <div class="card search-card">
            <div class="api-notice">
                <i class="fas fa-info-circle"></i>
                <span>Add your free API key from <a href="https://emailvalidation.io" target="_blank">emailvalidation.io</a> in <code>script.js</code> to enable live validation.</span>
            </div>
            <form id="validateForm">
                <div class="input-row">
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="emailInput" placeholder="Enter email address to validate..." required autocomplete="off">
                    </div>
                    <button class="btn" type="submit" id="submitBtn">
                        <i class="fas fa-search"></i> Validate
                    </button>
                </div>
            </form>
        </div>

        <div class="results-card" id="resultCard">
            <div class="results-header" id="resultsHeader"></div>
            <div class="results-grid" id="resultCont"></div>
        </div>
    </main>

    <footer>
        <p>&copy; DeValidator &mdash; Powered by <a href="https://emailvalidation.io" target="_blank">EmailValidation.io</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
