<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify - Web Player: Music for everyone</title>
  <link rel="icon" href="favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══════════════ APP SHELL ═══════════════════ -->
<div class="spotify-app">

  <!-- ══ LEFT SIDEBAR ══════════════════════════ -->
  <aside class="sidebar" id="sidebar">

    <!-- Nav panel -->
    <div class="sidebar-nav-panel">
      <a href="#" class="sp-logo" aria-label="Spotify">
        <svg viewBox="0 0 78 24" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.507 17.306a.748.748 0 01-1.03.249c-2.82-1.723-6.37-2.112-10.551-1.158a.748.748 0 11-.334-1.458c4.576-1.046 8.502-.595 11.667 1.337.353.216.464.676.248 1.03zm1.47-3.27a.936.936 0 01-1.287.308C14.85 12.262 10.9 11.667 6.07 13.027a.936.936 0 01-.522-1.797c5.322-1.547 9.727-.87 13.122 1.52a.936.936 0 01.308 1.287zm.126-3.405C15.553 8.565 10.8 8.4 6.6 9.657A1.123 1.123 0 016.28 7.44c4.783-1.453 10.13-1.17 13.957 1.07a1.123 1.123 0 01-1.133 1.942v-.001z"/>
          <text x="27" y="17" font-family="DM Sans, sans-serif" font-weight="700" font-size="14" fill="white">Spotify</text>
        </svg>
      </a>

      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" id="navHome">
          <i class="fa-solid fa-house nav-icon"></i>
          <span>Home</span>
        </a>
        <a href="#" class="nav-item" id="navSearch">
          <i class="fa-solid fa-magnifying-glass nav-icon"></i>
          <span>Search</span>
        </a>
      </nav>
    </div>

    <!-- Library panel -->
    <div class="sidebar-library-panel">
      <div class="library-header">
        <button class="lib-title-btn">
          <i class="fa-solid fa-swatchbook"></i>
          <span>Your Library</span>
        </button>
        <div class="lib-header-actions">
          <button class="lib-icon-btn" title="Create playlist or folder">
            <i class="fa-solid fa-plus"></i>
          </button>
          <button class="lib-icon-btn" title="Show more">
            <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </div>

      <!-- Filter chips -->
      <div class="lib-filters">
        <button class="filter-chip active" data-filter="all">Playlists</button>
        <button class="filter-chip" data-filter="albums">Albums</button>
        <button class="filter-chip" data-filter="artists">Artists</button>
      </div>

      <!-- Library list -->
      <div class="lib-list" id="libList">
        <!-- populated by JS -->
      </div>

      <!-- Footer -->
      <div class="sidebar-footer">
        <a href="#">Legal</a>
        <a href="#">Privacy Center</a>
        <a href="#">Cookies</a>
        <a href="#">About Ads</a>
        <a href="#">Accessibility</a>
      </div>
    </div>
  </aside>

  <!-- ══ MAIN CONTENT ═══════════════════════════ -->
  <main class="main-content" id="mainContent">

    <!-- Sticky top bar -->
    <div class="topbar" id="topbar">
      <div class="topbar-left">
        <button class="topbar-btn" id="navBack" title="Go back">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
        <button class="topbar-btn" id="navFwd" title="Go forward">
          <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>
      <div class="topbar-right">
        <button class="topbar-pill" id="topbarNotif" title="What's new">
          <i class="fa-regular fa-bell"></i>
        </button>
        <button class="topbar-user" id="topbarUser">
          <div class="topbar-avatar">A</div>
          <span>User</span>
          <i class="fa-solid fa-chevron-down" style="font-size:.55rem;margin-left:2px;"></i>
        </button>
      </div>
    </div>

    <!-- Scrollable content -->
    <div class="content-area" id="contentArea">

      <!-- ── Home View ─────────────────────────── -->
      <section id="viewHome" class="view active">

        <!-- Hero greeting -->
        <div class="greeting-section">
          <div class="greeting-grid" id="greetingGrid">
            <!-- populated by JS -->
          </div>
        </div>

        <!-- Recently Played -->
        <div class="content-section">
          <div class="section-header">
            <h2 class="section-title">Recently played</h2>
            <a href="#" class="show-all-btn">Show all</a>
          </div>
          <div class="card-grid" id="recentGrid">
            <!-- populated by JS -->
          </div>
        </div>

        <!-- Featured Albums -->
        <div class="content-section">
          <div class="section-header">
            <h2 class="section-title">Featured Albums</h2>
            <a href="#" class="show-all-btn">Show all</a>
          </div>
          <div class="card-grid" id="albumGrid">
            <!-- populated by JS -->
          </div>
        </div>

        <!-- Made for you -->
        <div class="content-section">
          <div class="section-header">
            <h2 class="section-title">Made for you</h2>
            <a href="#" class="show-all-btn">Show all</a>
          </div>
          <div class="card-grid" id="madeGrid">
            <!-- populated by JS -->
          </div>
        </div>

      </section>

      <!-- ── Album / Playlist View ──────────────── -->
      <section id="viewAlbum" class="view">

        <!-- Album hero -->
        <div class="album-hero" id="albumHero">
          <div class="album-hero-img" id="albumHeroImg"></div>
          <div class="album-hero-info">
            <span class="album-type" id="albumType">Album</span>
            <h1 class="album-title" id="albumTitle">Album Title</h1>
            <div class="album-meta">
              <span class="album-artist" id="albumArtist">Artist</span>
              <span class="dot">•</span>
              <span id="albumYear">2024</span>
              <span class="dot">•</span>
              <span id="albumTrackCount">0 songs</span>
            </div>
          </div>
        </div>

        <!-- Album actions -->
        <div class="album-actions">
          <button class="play-big-btn" id="albumPlayBtn">
            <i class="fa-solid fa-play"></i>
          </button>
          <button class="action-icon-btn like-btn" id="albumLikeBtn" title="Save to library">
            <i class="fa-regular fa-heart"></i>
          </button>
          <button class="action-icon-btn" title="More options">
            <i class="fa-solid fa-ellipsis"></i>
          </button>
        </div>

        <!-- Track list header -->
        <div class="track-list-header">
          <span class="th-num">#</span>
          <span class="th-title">Title</span>
          <span class="th-album">Album</span>
          <span class="th-duration"><i class="fa-regular fa-clock"></i></span>
        </div>

        <div class="track-list" id="trackList">
          <!-- populated by JS -->
        </div>

      </section>

      <!-- ── Search View ────────────────────────── -->
      <section id="viewSearch" class="view">
        <div class="search-box-wrap">
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="What do you want to play?" autocomplete="off" />
          </div>
        </div>
        <h2 class="section-title" style="margin:28px 0 16px">Browse all</h2>
        <div class="browse-grid" id="browseGrid">
          <!-- genre cards -->
        </div>
      </section>

    </div><!-- /content-area -->
  </main>

</div><!-- /spotify-app -->

<!-- ══ NOW PLAYING BAR ════════════════════════════ -->
<div class="now-playing-bar" id="nowPlayingBar">

  <!-- Left: track info -->
  <div class="np-left">
    <div class="np-cover" id="npCover">
      <img id="npCoverImg" src="" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
      <div id="npCoverPlaceholder" style="display:flex;width:100%;height:100%;align-items:center;justify-content:center;background:#1a1a2e;border-radius:4px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4a4a6a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
    </div>
    <div class="np-info">
      <div class="np-title" id="npTitle">–</div>
      <div class="np-artist" id="npArtist">–</div>
    </div>
    <button class="np-like-btn" id="npLike" title="Save to Liked Songs">
      <i class="fa-regular fa-heart"></i>
    </button>
  </div>

  <!-- Center: controls + seekbar -->
  <div class="np-center">
    <div class="np-controls">
      <button class="ctrl-btn" id="ctrlShuffle" title="Shuffle">
        <i class="fa-solid fa-shuffle"></i>
      </button>
      <button class="ctrl-btn ctrl-prev" id="ctrlPrev" title="Previous">
        <i class="fa-solid fa-backward-step"></i>
      </button>
      <button class="ctrl-play" id="ctrlPlay" title="Play">
        <i class="fa-solid fa-play" id="playIcon"></i>
      </button>
      <button class="ctrl-btn ctrl-next" id="ctrlNext" title="Next">
        <i class="fa-solid fa-forward-step"></i>
      </button>
      <button class="ctrl-btn" id="ctrlRepeat" title="Repeat">
        <i class="fa-solid fa-repeat"></i>
      </button>
    </div>
    <div class="np-seek-row">
      <span class="np-time" id="timeElapsed">0:00</span>
      <div class="seek-bar-wrap" id="seekBarWrap">
        <div class="seek-bar-bg">
          <div class="seek-bar-fill" id="seekFill"></div>
          <div class="seek-thumb" id="seekThumb"></div>
        </div>
      </div>
      <span class="np-time" id="timeDuration">0:00</span>
    </div>
  </div>

  <!-- Right: volume + extras -->
  <div class="np-right">
    <button class="np-extra-btn" id="btnQueue" title="Queue">
      <i class="fa-solid fa-list"></i>
    </button>
    <button class="np-extra-btn" id="btnDevice" title="Connect to a device">
      <i class="fa-solid fa-desktop"></i>
    </button>
    <div class="volume-row">
      <button class="np-extra-btn" id="volMute" title="Mute">
        <i class="fa-solid fa-volume-high" id="volIcon"></i>
      </button>
      <div class="vol-bar-wrap" id="volBarWrap">
        <div class="vol-bar-bg">
          <div class="vol-bar-fill" id="volFill"></div>
          <div class="vol-thumb" id="volThumb"></div>
        </div>
      </div>
    </div>
    <button class="np-extra-btn" id="btnFullscreen" title="Full screen">
      <i class="fa-solid fa-up-right-and-down-left-from-center"></i>
    </button>
  </div>

</div>

<!-- ══ TOAST ══════════════════════════════════════ -->
<div id="toastContainer"></div>

<!-- ══ MOBILE SIDEBAR OVERLAY ════════════════════ -->
<div class="sidebar-overlay hidden" id="sidebarOverlay"></div>

<!-- Mobile hamburger -->
<button class="mobile-menu-btn" id="mobileMenuBtn">
  <i class="fa-solid fa-bars"></i>
</button>

<script src="script.js"></script>
<!-- Back to All Projects -->
<a id="back-to-all" href="../index.html" style="position:fixed;bottom:16px;left:16px;z-index:99999;display:inline-flex;align-items:center;gap:6px;padding:7px 13px;background:rgba(7,7,14,0.88);color:#c4b5fd;border:1px solid rgba(167,139,250,0.3);border-radius:20px;font-size:0.72rem;font-weight:700;text-decoration:none;backdrop-filter:blur(12px);font-family:system-ui,sans-serif;transition:all .2s;white-space:nowrap;" onmouseover="this.style.background='rgba(124,58,237,0.25)';this.style.borderColor='rgba(167,139,250,0.55)'" onmouseout="this.style.background='rgba(7,7,14,0.88)';this.style.borderColor='rgba(167,139,250,0.3)'"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>All Projects</a>
</body>
</html>
