<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="2048 - Slide tiles to combine them and reach the 2048 tile. A challenging puzzle game on ArcadeHub!">
  <title>2048 - ArcadeHub</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .game-header {
      text-align: center;
      margin: 2rem 0;
    }

    .game-header h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .game-container {
      max-width: 500px;
      margin: 0 auto;
      padding: 2rem;
    }

    .game-info {
      text-align: center;
      margin-bottom: 2rem;
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-box {
      background: rgba(45, 53, 97, 0.6);
      padding: 1.5rem;
      border-radius: 0.75rem;
      border: 1px solid rgba(0, 212, 255, 0.2);
      text-align: center;
    }

    .stat-box label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .stat-box .value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary-color);
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      margin-bottom: 2rem;
      background: rgba(30, 35, 70, 0.6);
      padding: 1rem;
      border-radius: 1rem;
      border: 2px solid rgba(0, 212, 255, 0.2);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
    }

    .tile {
      aspect-ratio: 1;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      background: rgba(45, 53, 97, 0.5);
      color: var(--text-primary);
      border: 2px solid rgba(0, 212, 255, 0.1);
      transition: all 0.15s ease-in-out;
      position: relative;
    }

    .tile.empty {
      background: rgba(30, 35, 70, 0.3);
      color: transparent;
    }

    .tile.move {
      animation: tileMove 0.15s ease-in-out;
    }

    @keyframes tileMove {
      0% {
        transform: scale(0.95);
      }
      100% {
        transform: scale(1);
      }
    }

    .tile.merge {
      animation: tileMerge 0.2s ease-in-out;
    }

    @keyframes tileMerge {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
      }
    }

    /* Tile colors */
    .tile[data-value="2"] {
      background: linear-gradient(135deg, rgba(238, 228, 218, 0.9), rgba(237, 224, 200, 0.9));
      color: #776e65;
      box-shadow: 0 0 10px rgba(238, 228, 218, 0.3);
    }

    .tile[data-value="4"] {
      background: linear-gradient(135deg, rgba(237, 224, 200, 0.95), rgba(242, 177, 121, 0.9));
      color: #776e65;
      box-shadow: 0 0 10px rgba(242, 177, 121, 0.3);
    }

    .tile[data-value="8"] {
      background: linear-gradient(135deg, rgba(242, 177, 121, 0.95), rgba(245, 149, 99, 0.9));
      color: #f9f6f2;
      box-shadow: 0 0 10px rgba(245, 149, 99, 0.3);
    }

    .tile[data-value="16"] {
      background: linear-gradient(135deg, rgba(245, 149, 99, 0.95), rgba(246, 124, 95, 0.9));
      color: #f9f6f2;
      box-shadow: 0 0 10px rgba(246, 124, 95, 0.3);
    }

    .tile[data-value="32"] {
      background: linear-gradient(135deg, rgba(246, 124, 95, 0.95), rgba(234, 66, 53, 0.9));
      color: #f9f6f2;
      box-shadow: 0 0 15px rgba(234, 66, 53, 0.4);
    }

    .tile[data-value="64"] {
      background: linear-gradient(135deg, rgba(234, 66, 53, 0.95), rgba(211, 32, 39, 0.9));
      color: #f9f6f2;
      box-shadow: 0 0 15px rgba(211, 32, 39, 0.4);
    }

    .tile[data-value="128"] {
      background: linear-gradient(135deg, rgba(211, 32, 39, 0.95), rgba(131, 56, 236, 0.9));
      color: #f9f6f2;
      font-size: 1.5rem;
      box-shadow: 0 0 20px rgba(131, 56, 236, 0.4);
    }

    .tile[data-value="256"] {
      background: linear-gradient(135deg, rgba(131, 56, 236, 0.95), rgba(40, 167, 255, 0.9));
      color: #f9f6f2;
      font-size: 1.5rem;
      box-shadow: 0 0 20px rgba(40, 167, 255, 0.4);
    }

    .tile[data-value="512"] {
      background: linear-gradient(135deg, rgba(40, 167, 255, 0.95), rgba(0, 212, 255, 0.9));
      color: #f9f6f2;
      font-size: 1.3rem;
      box-shadow: 0 0 25px rgba(0, 212, 255, 0.5);
    }

    .tile[data-value="1024"] {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.95), rgba(16, 185, 129, 0.9));
      color: #f9f6f2;
      font-size: 1.2rem;
      box-shadow: 0 0 25px rgba(16, 185, 129, 0.5);
    }

    .tile[data-value="2048"],
    .tile[data-value="4096"],
    .tile[data-value="8192"],
    .tile[data-value="16384"],
    .tile[data-value="32768"],
    .tile[data-value="65536"] {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.95), rgba(34, 197, 94, 0.9));
      color: #f9f6f2;
      font-size: 1.2rem;
      box-shadow: 0 0 30px rgba(16, 185, 129, 0.6);
    }

    .controls {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.9rem 1.8rem;
      background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
      color: var(--dark-bg);
      border: none;
      border-radius: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      font-size: 1rem;
      box-shadow: 0 4px 15px rgba(0, 212, 255, 0.2);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
    }

    .btn.secondary {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(131, 56, 236, 0.1));
      color: var(--primary-color);
      border: 2px solid rgba(0, 212, 255, 0.3);
    }

    .btn.secondary:hover {
      border-color: var(--primary-color);
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(131, 56, 236, 0.2));
    }

    .message {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      min-height: 1.5rem;
      color: var(--primary-color);
    }

    .message.error {
      color: var(--danger-color);
    }

    .message.success {
      color: var(--success-color);
    }

    .arrow-keys {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <div class="logo-icon">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="36" height="36" rx="6" fill="none" stroke="url(#logoGradient)" stroke-width="2.5"/>
            <circle cx="10" cy="10" r="3" fill="url(#logoGradient)"/>
            <circle cx="30" cy="10" r="3" fill="url(#logoGradient)"/>
            <rect x="8" y="22" width="24" height="3" rx="1.5" fill="url(#logoGradient)"/>
            <line x1="18" y1="5" x2="22" y2="5" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
            <line x1="18" y1="35" x2="22" y2="35" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
            <defs>
              <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
                <stop offset="50%" style="stop-color:#ff006e;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#8338ec;stop-opacity:1" />
              </linearGradient>
            </defs>
          </svg>
        </div>
            </defs>
          </svg>
        </div>
        <span class="logo-text">ArcadeHub</span>
      </div>
      <div class="nav-menu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="index.html#games" class="nav-link">Games</a>
      </div>
    </div>
  </nav>

  <div class="game-header">
    <h1>🎯 2048</h1>
    <a href="index.html" class="back-button">← Back to Hub</a>
  </div>

  <div class="game-container">
    <div class="game-info">
      <p>Slide tiles to combine them and reach 2048!</p>
    </div>

    <div class="stats-grid">
      <div class="stat-box">
        <label>Score</label>
        <div class="value" id="score">0</div>
      </div>
      <div class="stat-box">
        <label>Best Score</label>
        <div class="value" id="bestScore">0</div>
      </div>
    </div>

    <div class="message" id="message"></div>

    <div class="game-grid" id="gameGrid">
      <!-- Tiles will be generated by JavaScript -->
    </div>

    <div class="arrow-keys">
      Use arrow keys or swipe to move tiles
    </div>

    <div class="controls">
      <button class="btn" onclick="newGame()">New Game</button>
      <button class="btn secondary" onclick="location.href='index.html'">Back to Hub</button>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/2048.js"></script>
</body>
</html>
