<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Quiz Master - Test your knowledge with challenging trivia questions. 10 random questions selected from a pool of 30. Play on ArcadeHub!">
  <title>Quiz Master - ArcadeHub</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .game-header {
      text-align: center;
      margin: 2rem 0;
    }

    .game-header h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .game-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem;
    }

    .quiz-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin: 2rem 0;
      padding: 1.5rem;
      background: rgba(45, 53, 97, 0.5);
      border: 1px solid rgba(0, 212, 255, 0.1);
      border-radius: 1rem;
    }

    .stat-box {
      text-align: center;
    }

    .stat-box label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .stat-box .value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary-color);
    }

    .question-container {
      background: rgba(45, 53, 97, 0.6);
      border: 2px solid rgba(0, 212, 255, 0.2);
      border-radius: 1rem;
      padding: 2rem;
      margin: 2rem 0;
      min-height: 250px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .question-number {
      font-size: 0.9rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    .question-text {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .option-btn {
      padding: 1rem;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(131, 56, 236, 0.1));
      border: 2px solid rgba(0, 212, 255, 0.3);
      border-radius: 0.75rem;
      color: var(--text-primary);
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-size: 1rem;
      text-align: left;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--primary-color);
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(131, 56, 236, 0.2));
      transform: translateX(5px);
    }

    .option-btn:disabled {
      cursor: not-allowed;
    }

    .option-btn.correct {
      background: linear-gradient(135deg, #10b981, #059669);
      border-color: #10b981;
      color: white;
    }

    .option-btn.incorrect {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border-color: #ef4444;
      color: white;
    }

    .option-btn.skipped {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .message {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 600;
      margin: 1rem 0;
      min-height: 1.5rem;
      color: var(--primary-color);
    }

    .message.success {
      color: var(--success-color);
    }

    .message.error {
      color: var(--danger-color);
    }

    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 2rem;
    }

    .btn {
      padding: 0.9rem 1.8rem;
      background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
      color: var(--dark-bg);
      border: none;
      border-radius: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      font-size: 1rem;
      box-shadow: 0 4px 15px rgba(0, 212, 255, 0.2);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
    }

    .btn.secondary {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(131, 56, 236, 0.1));
      color: var(--primary-color);
      border: 2px solid rgba(0, 212, 255, 0.3);
    }

    .btn.secondary:hover {
      border-color: var(--primary-color);
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(131, 56, 236, 0.2));
    }

    .results-container {
      display: none;
      text-align: center;
    }

    .results-container.show {
      display: block;
    }

    .score-display {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 1rem 0;
    }

    .results-message {
      font-size: 1.3rem;
      color: var(--text-secondary);
      margin: 1rem 0;
    }

    @media (max-width: 768px) {
      .game-header h1 {
        font-size: 1.8rem;
      }

      .question-text {
        font-size: 1.1rem;
      }

      .quiz-stats {
        grid-template-columns: 1fr;
      }

      .game-container {
        padding: 1rem;
      }
    }

    @media (max-width: 480px) {
      .game-header h1 {
        font-size: 1.5rem;
      }

      .question-container {
        padding: 1.5rem;
        min-height: 200px;
      }

      .question-text {
        font-size: 1rem;
        margin-bottom: 1.5rem;
      }

      .option-btn {
        padding: 0.8rem;
        font-size: 0.9rem;
      }

      .score-display {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <div class="logo-icon">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="36" height="36" rx="6" fill="none" stroke="url(#logoGradient)" stroke-width="2.5"/>
            <circle cx="10" cy="10" r="3" fill="url(#logoGradient)"/>
            <circle cx="30" cy="10" r="3" fill="url(#logoGradient)"/>
            <rect x="8" y="22" width="24" height="3" rx="1.5" fill="url(#logoGradient)"/>
            <line x1="18" y1="5" x2="22" y2="5" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
            <line x1="18" y1="35" x2="22" y2="35" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
            <defs>
              <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
                <stop offset="50%" style="stop-color:#ff006e;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#8338ec;stop-opacity:1" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="logo-text">ArcadeHub</span>
      </div>
      <div class="nav-menu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="index.html#games" class="nav-link">Games</a>
      </div>
    </div>
  </nav>

  <div class="game-header">
    <h1>🧠 Quiz Master</h1>
    <a href="index.html" class="back-button">← Back to Hub</a>
  </div>

  <div class="game-container">
    <div class="quiz-stats">
      <div class="stat-box">
        <label>Score</label>
        <div class="value" id="score">0</div>
      </div>
      <div class="stat-box">
        <label>Correct</label>
        <div class="value" id="correct">0</div>
      </div>
      <div class="stat-box">
        <label>Best Score</label>
        <div class="value" id="bestScore">0</div>
      </div>
    </div>

    <div id="quizContainer">
      <div class="question-container">
        <div>
          <div class="question-number" id="questionNumber">Question 1 of 10</div>
          <div class="question-text" id="question"></div>
        </div>
        <div class="options" id="options"></div>
      </div>
      <div class="message" id="message"></div>
    </div>

    <div class="results-container" id="results">
      <h2 style="font-size: 1.8rem; color: var(--primary-color); margin-bottom: 1rem;">Quiz Complete!</h2>
      <div class="score-display" id="finalScore"></div>
      <div class="results-message" id="resultsMessage"></div>
    </div>

    <div class="controls">
      <button class="btn" onclick="startQuiz()">Start Quiz</button>
      <button class="btn secondary" onclick="location.href='index.html'">Back to Hub</button>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
