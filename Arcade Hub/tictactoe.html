<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tic Tac Toe - Challenge the AI in this classic strategy game. Can you beat the computer? Play on ArcadeHub!">
  <title>Tic Tac Toe - ArcadeHub</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .game-header {
      text-align: center;
      margin: 2rem 0;
    }

    .game-header h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .game-container {
      max-width: 500px;
      margin: 0 auto;
      padding: 2rem;
    }

    .game-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
      background: rgba(45, 53, 97, 0.5);
      padding: 1.5rem;
      border-radius: 0.75rem;
      border: 1px solid rgba(0, 212, 255, 0.2);
    }

    .stat {
      text-align: center;
    }

    .stat label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .stat .value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary-color);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin: 2rem 0;
      background: rgba(30, 35, 70, 0.6);
      padding: 1.5rem;
      border-radius: 1rem;
      border: 2px solid rgba(0, 212, 255, 0.2);
    }

    .cell {
      aspect-ratio: 1;
      background: linear-gradient(135deg, rgba(45, 53, 97, 0.8), rgba(26, 31, 58, 0.8));
      border: 2px solid rgba(0, 212, 255, 0.3);
      border-radius: 0.75rem;
      font-size: 2.5rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
    }

    .cell:hover:not(:disabled) {
      border-color: var(--primary-color);
      background: linear-gradient(135deg, rgba(45, 53, 97, 0.95), rgba(26, 31, 58, 0.95));
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
    }

    .cell:disabled {
      cursor: not-allowed;
    }

    .cell.x {
      color: var(--primary-color);
      text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
    }

    .cell.o {
      color: var(--secondary-color);
      text-shadow: 0 0 10px rgba(255, 0, 110, 0.5);
    }

    .message {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 600;
      margin: 1rem 0;
      min-height: 1.5rem;
      color: var(--primary-color);
    }

    .message.draw {
      color: var(--warning-color);
    }

    .message.win {
      color: var(--success-color);
    }

    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .btn {
      padding: 0.9rem 1.8rem;
      background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
      color: var(--dark-bg);
      border: none;
      border-radius: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      font-size: 1rem;
      box-shadow: 0 4px 15px rgba(0, 212, 255, 0.2);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
    }

    .btn.secondary {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(131, 56, 236, 0.1));
      color: var(--primary-color);
      border: 2px solid rgba(0, 212, 255, 0.3);
    }

    .btn.secondary:hover {
      border-color: var(--primary-color);
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(131, 56, 236, 0.2));
    }

    .difficulty {
      text-align: center;
      margin-bottom: 2rem;
    }

    .difficulty-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .difficulty-btn {
      padding: 0.6rem 1.2rem;
      background: rgba(0, 212, 255, 0.1);
      color: var(--primary-color);
      border: 2px solid rgba(0, 212, 255, 0.3);
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .difficulty-btn.active {
      background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
      color: var(--dark-bg);
      border-color: var(--primary-color);
    }

    .difficulty-btn:hover {
      border-color: var(--primary-color);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <div class="logo-icon">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="36" height="36" rx="6" fill="none" stroke="url(#logoGradient)" stroke-width="2.5"/>
            <circle cx="10" cy="10" r="3" fill="url(#logoGradient)"/>
            <circle cx="30" cy="10" r="3" fill="url(#logoGradient)"/>
            <rect x="8" y="22" width="24" height="3" rx="1.5" fill="url(#logoGradient)"/>
            <line x1="18" y1="5" x2="22" y2="5" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
            <line x1="18" y1="35" x2="22" y2="35" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
            <defs>
              <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
                <stop offset="50%" style="stop-color:#ff006e;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#8338ec;stop-opacity:1" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="logo-text">ArcadeHub</span>
      </div>
      <div class="nav-menu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="index.html#games" class="nav-link">Games</a>
      </div>
    </div>
  </nav>

  <div class="game-header">
    <h1>⭕ Tic Tac Toe</h1>
    <a href="index.html" class="back-button">← Back to Hub</a>
  </div>

  <div class="game-container">
    <div class="difficulty">
      <label style="color: var(--text-secondary); margin-bottom: 1rem; display: block;">Choose Difficulty:</label>
      <div class="difficulty-buttons">
        <button class="difficulty-btn active" onclick="setDifficulty('easy')">Easy</button>
        <button class="difficulty-btn" onclick="setDifficulty('medium')">Medium</button>
        <button class="difficulty-btn" onclick="setDifficulty('hard')">Hard</button>
      </div>
    </div>

    <div class="game-stats">
      <div class="stat">
        <label>Wins</label>
        <div class="value" id="wins">0</div>
      </div>
      <div class="stat">
        <label>Draws</label>
        <div class="value" id="draws">0</div>
      </div>
      <div class="stat">
        <label>Losses</label>
        <div class="value" id="losses">0</div>
      </div>
    </div>

    <div class="message" id="message"></div>

    <div class="board" id="board">
      <!-- Cells will be generated by JavaScript -->
    </div>

    <div class="controls">
      <button class="btn" onclick="newGame()">New Game</button>
      <button class="btn secondary" onclick="location.href='index.html'">Back to Hub</button>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/tictactoe.js"></script>
</body>
</html>
