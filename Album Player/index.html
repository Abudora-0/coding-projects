<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Album Studio</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23111'/%3E%3Ccircle cx='16' cy='16' r='11' fill='%231a1a1a' stroke='%231db954' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%23222' stroke='%231db954' stroke-width='1'/%3E%3Ccircle cx='16' cy='16' r='2.5' fill='%231db954'/%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ════════════════════════════════════════════════
     STUDIO VIEW  (create / edit album)
════════════════════════════════════════════════ -->
<div id="studioView">

  <!-- Studio header -->
  <header class="studio-header">
    <div class="studio-brand">
      <i class="fa-solid fa-record-vinyl brand-icon"></i>
      <span>Album Studio</span>
    </div>
    <div class="studio-album-tabs" id="albumTabs">
      <!-- populated by JS -->
    </div>
    <button class="new-album-btn" id="newAlbumBtn">
      <i class="fa-solid fa-plus"></i> New Album
    </button>
  </header>

  <!-- Studio body -->
  <div class="studio-body">

    <!-- ── LEFT: Art + Meta ───────────────────── -->
    <div class="studio-left">

      <!-- Album art upload -->
      <div class="art-zone" id="artZone">
        <div class="art-zone-inner" id="artZoneInner">
          <img id="artPreview" class="art-preview hidden" src="" alt="Album Art" />
          <div class="art-placeholder" id="artPlaceholder">
            <i class="fa-solid fa-image"></i>
            <span>Album Cover</span>
            <small>Click or drag image</small>
          </div>
        </div>
        <input type="file" id="artInput" accept="image/*" style="display:none" />
      </div>

      <!-- Background image upload -->
      <div class="bg-upload-row">
        <div class="bg-mini-zone" id="bgZone">
          <img id="bgPreview" class="bg-preview hidden" src="" alt="bg" />
          <span id="bgLabel"><i class="fa-solid fa-panorama"></i> Background</span>
        </div>
        <input type="file" id="bgInput" accept="image/*" style="display:none" />
        <div class="bg-hint">Background image (optional)</div>
      </div>

      <!-- Album metadata -->
      <div class="meta-form">
        <input class="meta-input" type="text"   id="inputTitle"  placeholder="Album Title"  maxlength="60" />
        <input class="meta-input" type="text"   id="inputArtist" placeholder="Artist Name"  maxlength="60" />
        <div class="meta-row-2">
          <input class="meta-input" type="number" id="inputYear"   placeholder="Year"         min="1900" max="2099" />
          <input class="meta-input" type="text"   id="inputGenre"  placeholder="Genre"        maxlength="30" />
        </div>
      </div>

      <!-- Accent color picker -->
      <div class="color-section">
        <div class="color-label">Accent Color</div>
        <div class="color-swatches" id="colorSwatches">
          <div class="swatch active" data-color="#1db954" style="background:#1db954"></div>
          <div class="swatch" data-color="#8b5cf6" style="background:#8b5cf6"></div>
          <div class="swatch" data-color="#ef4444" style="background:#ef4444"></div>
          <div class="swatch" data-color="#f59e0b" style="background:#f59e0b"></div>
          <div class="swatch" data-color="#3b82f6" style="background:#3b82f6"></div>
          <div class="swatch" data-color="#ec4899" style="background:#ec4899"></div>
          <div class="swatch" data-color="#14b8a6" style="background:#14b8a6"></div>
          <div class="swatch custom-swatch" data-color="" title="Custom color">
            <i class="fa-solid fa-eyedropper"></i>
            <input type="color" id="customColor" value="#1db954" />
          </div>
        </div>
      </div>

      <!-- Launch button -->
      <button class="launch-btn" id="launchBtn">
        <i class="fa-solid fa-play"></i>
        Play Album
      </button>
    </div>

    <!-- ── RIGHT: Song builder ────────────────── -->
    <div class="studio-right">

      <div class="songs-header">
        <h2 class="songs-title">Songs <span id="songCount" class="song-count-badge">0</span></h2>
        <div class="songs-actions">
          <button class="songs-action-btn" id="clearAllBtn" title="Clear all songs">
            <i class="fa-solid fa-trash-can"></i>
          </button>
        </div>
      </div>

      <!-- Song drop zone -->
      <div class="song-drop-zone" id="songDropZone">
        <i class="fa-solid fa-music"></i>
        <p>Drop MP3 files here</p>
        <span>or click to browse</span>
        <input type="file" id="songInput" accept="audio/*" multiple style="display:none" />
      </div>

      <!-- Song list -->
      <div class="song-builder-list" id="songBuilderList">
        <!-- song builder rows populated by JS -->
      </div>

      <!-- Add more -->
      <button class="add-more-btn" id="addMoreBtn">
        <i class="fa-solid fa-plus"></i> Add More Songs
        <input type="file" id="addMoreInput" accept="audio/*" multiple style="display:none" />
      </button>

    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════
     PLAYER VIEW  (immersive album player)
════════════════════════════════════════════════ -->
<div id="playerView" class="hidden">

  <!-- Dynamic blurred background -->
  <div class="player-bg" id="playerBg"></div>
  <div class="player-bg-overlay" id="playerBgOverlay"></div>

  <!-- Top bar -->
  <div class="player-topbar">
    <button class="topbar-back" id="backBtn">
      <i class="fa-solid fa-chevron-left"></i> Studio
    </button>
    <div class="topbar-album">
      <span class="topbar-album-name" id="topbarAlbumName">—</span>
      <span class="topbar-dot">·</span>
      <span class="topbar-artist" id="topbarArtist">—</span>
    </div>
    <div class="topbar-actions">
      <button class="topbar-btn" id="btnLyrics" title="Lyrics">
        <i class="fa-solid fa-align-left"></i>
      </button>
      <button class="topbar-btn" id="btnFullscreen" title="Fullscreen">
        <i class="fa-solid fa-expand"></i>
      </button>
    </div>
  </div>

  <!-- Player main layout -->
  <div class="player-layout">

    <!-- ── LEFT: Track list ──────────────────── -->
    <div class="tracklist-panel">
      <div class="tracklist-album-info">
        <div class="tl-cover" id="tlCover">
          <img id="tlCoverImg" src="" alt="" />
        </div>
        <div class="tl-meta">
          <div class="tl-album-name" id="tlAlbumName">—</div>
          <div class="tl-artist" id="tlArtist">—</div>
          <div class="tl-year-genre" id="tlYearGenre">—</div>
        </div>
      </div>

      <div class="tracklist" id="tracklistEl">
        <!-- populated by JS -->
      </div>
    </div>

    <!-- ── CENTER: Stage ─────────────────────── -->
    <div class="player-stage">

      <!-- Vinyl disc -->
      <div class="vinyl-wrap" id="vinylWrap">
        <!-- Tonearm -->
        <div class="tonearm" id="tonearm"></div>

        <div class="vinyl-disc" id="vinylDisc">
          <!-- Groove rings (CSS) -->
          <div class="vinyl-label">
            <img id="vinylArtImg" src="" alt="cover" onerror="this.style.display='none'" />
          </div>
          <div class="vinyl-center-hole"></div>
        </div>

        <!-- Glow ring -->
        <div class="vinyl-glow" id="vinylGlow"></div>
      </div>

      <!-- Song info -->
      <div class="stage-song-info">
        <div class="stage-title-wrap">
          <h2 class="stage-title marquee-wrap">
            <span class="stage-title-text" id="stageTitle">—</span>
          </h2>
        </div>
        <p class="stage-artist" id="stageArtist">—</p>
      </div>

      <!-- Visualizer -->
      <div class="visualizer" id="visualizer">
        <!-- bars populated by JS -->
      </div>

      <!-- Controls -->
      <div class="player-controls">
        <button class="ctrl-sm" id="ctrlShuffle" title="Shuffle">
          <i class="fa-solid fa-shuffle"></i>
        </button>
        <button class="ctrl-sm" id="ctrlPrev" title="Previous">
          <i class="fa-solid fa-backward-step"></i>
        </button>
        <button class="ctrl-play" id="ctrlPlay" title="Play / Pause">
          <i class="fa-solid fa-play" id="playIco"></i>
        </button>
        <button class="ctrl-sm" id="ctrlNext" title="Next">
          <i class="fa-solid fa-forward-step"></i>
        </button>
        <button class="ctrl-sm" id="ctrlRepeat" title="Repeat">
          <i class="fa-solid fa-repeat"></i>
        </button>
      </div>

      <!-- Seek bar -->
      <div class="seek-row">
        <span class="seek-time" id="timeNow">0:00</span>
        <div class="seek-track" id="seekTrack">
          <div class="seek-fill" id="seekFill"></div>
          <div class="seek-thumb" id="seekThumb"></div>
        </div>
        <span class="seek-time" id="timeTotal">0:00</span>
      </div>

      <!-- Volume + like -->
      <div class="bottom-row">
        <button class="like-btn" id="likeBtn" title="Like">
          <i class="fa-regular fa-heart"></i>
        </button>
        <div class="vol-row">
          <button class="vol-icon-btn" id="volIconBtn">
            <i class="fa-solid fa-volume-high" id="volIco"></i>
          </button>
          <div class="vol-track" id="volTrack">
            <div class="vol-fill" id="volFill"></div>
            <div class="vol-thumb" id="volThumb"></div>
          </div>
        </div>
        <div class="speed-wrap">
          <button class="speed-btn" id="speedBtn" title="Playback speed">1×</button>
        </div>
      </div>

    </div>

    <!-- ── RIGHT: Lyrics / Info panel ───────── -->
    <div class="info-panel" id="infoPanel">
      <div class="panel-tabs">
        <button class="panel-tab active" data-tab="lyrics">Lyrics</button>
        <button class="panel-tab" data-tab="info">About</button>
        <button class="panel-tab" data-tab="queue">Up Next</button>
      </div>

      <div class="panel-content" id="panelContent">

        <div class="tab-pane active" id="tabLyrics">
          <div class="lyrics-display" id="lyricsDisplay">
            <div class="lyrics-empty">
              <i class="fa-solid fa-align-left"></i>
              <p>No lyrics added</p>
              <button class="lyrics-edit-btn" id="lyricsEditBtn">Add lyrics in Studio</button>
            </div>
          </div>
        </div>

        <div class="tab-pane" id="tabInfo">
          <div class="about-panel" id="aboutPanel">
            <!-- populated by JS -->
          </div>
        </div>

        <div class="tab-pane" id="tabQueue">
          <div class="queue-list" id="queueList">
            <!-- populated by JS -->
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<!-- ── Lyrics editor modal ─────────────────────── -->
<div class="modal-overlay hidden" id="lyricsModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Edit Lyrics</h3>
      <button class="modal-close" id="lyricsModalClose"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-song-sel">
      <label>Song:</label>
      <select id="lyricsSongSel"></select>
    </div>
    <textarea class="lyrics-textarea" id="lyricsTextarea" placeholder="Paste or type lyrics here…"></textarea>
    <div class="modal-footer">
      <button class="modal-save" id="lyricsSave">Save Lyrics</button>
    </div>
  </div>
</div>

<!-- ── Toast ──────────────────────────────────── -->
<div id="toastWrap"></div>

<script src="script.js"></script>

</body>
</html>
