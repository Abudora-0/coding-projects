<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - A Music Player for GNX</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <ul>
            <li class="brand"><img src="logo.png" alt="Spotify">Spotify</li>
        </ul>
    </nav>

    <div class="container">
        <div class="songList">
            <h1>GNX - Kendrick Lamar</h1>
            <div class="songItemContainer">
                <div class="songItem">
                    <img alt="1">
                    <span class="songName"></span>
                    <span class="songlistplay"><span class="timestamp">5:17 <i id="0"
                                class="far songItemPlay fa-play-circle" ></i></span></span>
                </div>
                <div class="songItem">
                    <img alt="2">
                    <span class="songName"></span>
                    <span class="songlistplay"><span class="timestamp">2:37 <i id="1"
                                class="far songItemPlay fa-play-circle" ></i></span></span>
                </div>
                <div class="songItem">
                    <img alt="3">
                    <span class="songName"></span>
                    <span class="songlistplay"><span class="timestamp">2:57 <i id="2"
                                class="far songItemPlay fa-play-circle" ></i></span></span>
                </div>
                <div class="songItem">
                    <img alt="4">
                    <span class="songName"></span>
                    <span class="songlistplay"><span class="timestamp">3:53 <i id="3"
                                class="far songItemPlay fa-play-circle" ></i></span></span>
                </div>
                <div class="songItem">
                    <img alt="5">
                    <span class="songName"></span>
                    <span class="songlistplay"><span class="timestamp">3:37 <i id="4"
                                class="far songItemPlay fa-play-circle" ></i></span></span>
                </div>
                <div class="songItem">
                    <img alt="6">
                    <span class="songName"></span>
                    <span class="songlistplay"><span class="timestamp">4:35 <i id="5"
                                class="far songItemPlay fa-play-circle"></i></span></span>
                </div>
                <div class="songItem">
                    <img alt="7">
                    <span class="songName"></span>
                    <span class="songlistplay"><span class="timestamp">3:40 <i id="6"
                                class="far songItemPlay fa-play-circle"></i></span></span>
                </div>
                <div class="songItem">
                    <img alt="8">
                    <span class="songName"></span>
                    <span class="songlistplay"><span class="timestamp">2:11 <i id="7"
                                class="far songItemPlay fa-play-circle" ></i></span></span>
                </div>
                <div class="songItem">
                    <img alt="9">
                    <span class="songName"></span>
                    <span class="songlistplay"><span class="timestamp">2:35<i id="8"
                                class="far songItemPlay fa-play-circle" ></i></span></span>
                </div>
                <div class="songItem">
                    <img alt="10">
                    <span class="songName"></span>
                    <span class="songlistplay"><span class="timestamp">4:52 <i id="9"
                                class="far songItemPlay fa-play-circle"></i></span></span>
                </div>
                <div class="songItem">
                    <img alt="11">
                    <span class="songName"></span>
                    <span class="songlistplay"><span class="timestamp">3:13 <i id="10"
                                class="far songItemPlay fa-play-circle"></i></span></span>
                </div>
                <div class="songItem">
                    <img alt="12">
                    <span class="songName"></span>
                    <span class="songlistplay"><span class="timestamp">4:47 <i id="11"
                                class="far songItemPlay fa-play-circle"></i></span></span>
                </div>
            </div>
        </div>
        <div class="songBanner"></div>
    </div>

    <div class="bottom">
        <input type="range" name="range" id="myProgressBar" max="100" min="0" value="0">
        <div class="icons">
            <i class="fas fa-2x fa-step-backward" id="previous"></i>
            <i class="far fa-2x fa-play-circle" id="masterPlay"></i>
            <i class="fas fa-2x fa-step-forward" id="next"></i>
        </div>
        <div class="songInfo">
            <img src="playing.gif" width="42px" alt="" id="gif"><span id="masterSongName"></span>
        </div>
    </div>
   

    <script src="script.js"></script>
    <script src="https://kit.fontawesome.com/594ac63ca8.js" crossorigin="anonymous"></script>
</body>

</html>
