<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeCalc — Calculator</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231c1c1e'/%3E%3Crect x='5' y='5' width='22' height='8' rx='2' fill='%23ff9500'/%3E%3Crect x='5' y='16' width='4' height='4' rx='1' fill='%23636366'/%3E%3Crect x='10' y='16' width='4' height='4' rx='1' fill='%23636366'/%3E%3Crect x='15' y='16' width='4' height='4' rx='1' fill='%23636366'/%3E%3Crect x='20' y='16' width='7' height='4' rx='1' fill='%23ff9500'/%3E%3Crect x='5' y='22' width='4' height='4' rx='1' fill='%23636366'/%3E%3Crect x='10' y='22' width='4' height='4' rx='1' fill='%23636366'/%3E%3Crect x='15' y='22' width='4' height='4' rx='1' fill='%23636366'/%3E%3Crect x='20' y='22' width='7' height='4' rx='1' fill='%23ff9500'/%3E%3C/svg%3E" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <a href="../index.html" class="back-pill"><i class="fas fa-arrow-left"></i> Projects</a>

  <div class="page-wrap">
    <div class="calc-shell" id="calcShell">

      <!-- ── TOOLBAR ───────────────────── -->
      <div class="toolbar">
        <span class="calc-brand">De<span>Calc</span></span>
        <div class="toolbar-right">
          <button class="tool-btn" id="degBtn" title="Toggle Degrees / Radians">DEG</button>
          <button class="tool-btn" id="sciBtn" title="Scientific mode"><i class="fas fa-flask"></i></button>
          <button class="tool-btn" id="histBtn" title="History"><i class="fas fa-clock-rotate-left"></i></button>
        </div>
      </div>

      <!-- ── DISPLAY ───────────────────── -->
      <div class="display">
        <div class="display-expr" id="dispExpr">&nbsp;</div>
        <div class="display-result" id="dispResult">0</div>
        <div class="display-sub">
          <span class="mem-badge hidden" id="memBadge">M</span>
          <button class="copy-btn" id="copyBtn" title="Copy result"><i class="fas fa-copy"></i></button>
        </div>
      </div>

      <!-- ── SCIENTIFIC PANEL ──────────── -->
      <div class="sci-panel hidden" id="sciPanel">
        <div class="btn-grid sci-grid">
          <button class="btn btn-sci" data-action="sin">sin</button>
          <button class="btn btn-sci" data-action="cos">cos</button>
          <button class="btn btn-sci" data-action="tan">tan</button>
          <button class="btn btn-sci" data-action="log">log</button>

          <button class="btn btn-sci" data-action="asin">sin⁻¹</button>
          <button class="btn btn-sci" data-action="acos">cos⁻¹</button>
          <button class="btn btn-sci" data-action="atan">tan⁻¹</button>
          <button class="btn btn-sci" data-action="ln">ln</button>

          <button class="btn btn-sci" data-action="sqrt">√</button>
          <button class="btn btn-sci" data-action="sq">x²</button>
          <button class="btn btn-sci" data-action="pow">xʸ</button>
          <button class="btn btn-sci" data-action="recip">1/x</button>

          <button class="btn btn-sci" data-action="pi">π</button>
          <button class="btn btn-sci" data-action="euler">e</button>
          <button class="btn btn-sci" data-action="(">(</button>
          <button class="btn btn-sci" data-action=")">)</button>
        </div>
      </div>

      <!-- ── MEMORY ROW ────────────────── -->
      <div class="mem-row">
        <button class="btn btn-mem" data-action="MC">MC</button>
        <button class="btn btn-mem" data-action="MR">MR</button>
        <button class="btn btn-mem" data-action="M+">M+</button>
        <button class="btn btn-mem" data-action="M-">M−</button>
        <button class="btn btn-mem" data-action="MS">MS</button>
      </div>

      <!-- ── MAIN BUTTONS ──────────────── -->
      <div class="btn-grid main-grid">
        <!-- Row 1 -->
        <button class="btn btn-fn"  data-action="AC">AC</button>
        <button class="btn btn-fn"  data-action="negate">±</button>
        <button class="btn btn-fn"  data-action="%">%</button>
        <button class="btn btn-op"  data-action="÷">÷</button>

        <!-- Row 2 -->
        <button class="btn btn-num" data-action="7">7</button>
        <button class="btn btn-num" data-action="8">8</button>
        <button class="btn btn-num" data-action="9">9</button>
        <button class="btn btn-op"  data-action="×">×</button>

        <!-- Row 3 -->
        <button class="btn btn-num" data-action="4">4</button>
        <button class="btn btn-num" data-action="5">5</button>
        <button class="btn btn-num" data-action="6">6</button>
        <button class="btn btn-op"  data-action="−">−</button>

        <!-- Row 4 -->
        <button class="btn btn-num" data-action="1">1</button>
        <button class="btn btn-num" data-action="2">2</button>
        <button class="btn btn-num" data-action="3">3</button>
        <button class="btn btn-op"  data-action="+">+</button>

        <!-- Row 5 -->
        <button class="btn btn-num btn-zero" data-action="0">0</button>
        <button class="btn btn-num" data-action=".">.</button>
        <button class="btn btn-fn"  data-action="backspace"><i class="fas fa-delete-left"></i></button>
        <button class="btn btn-eq"  data-action="=">=</button>
      </div>

    </div><!-- /calc-shell -->

    <!-- ── HISTORY PANEL ──────────────── -->
    <div class="hist-panel hidden" id="histPanel">
      <div class="hist-header">
        <span><i class="fas fa-clock-rotate-left"></i> History</span>
        <button class="hist-clear-btn" id="clearHistBtn">Clear</button>
      </div>
      <div class="hist-list" id="histList">
        <div class="hist-empty"><i class="fas fa-calculator"></i><p>No history yet</p></div>
      </div>
    </div>

  </div><!-- /page-wrap -->

  <script src="script.js"></script>
</body>
</html>
