<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DePass — Password Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav>
        <div class="logo">
            <img class="logoimg" src="logo.svg" alt="DePass Logo">
            <span>DePass</span>
        </div>
        <a href="../index.html" class="back-btn"><i class="fas fa-arrow-left"></i> All Projects</a>
    </nav>

    <main>
        <div class="hero">
            <h1><i class="fas fa-shield-halved"></i> Password Manager</h1>
            <p>Store and manage your passwords securely in your browser.</p>
        </div>

        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-key"></i> Saved Passwords</h2>
                <span id="alert" class="copied-badge"><i class="fas fa-check"></i> Copied!</span>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Website</th>
                            <th>Username</th>
                            <th>Password</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-plus-circle"></i> Add a Password</h2>
            </div>
            <form autocomplete="off">
                <div class="form-group">
                    <label for="website"><i class="fas fa-globe"></i> Website</label>
                    <input type="text" id="website" name="website" placeholder="e.g. github.com" required>
                </div>
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Username / Email</label>
                    <input type="text" id="username" name="username" placeholder="e.g. john@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="pass-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter password" required>
                        <button type="button" class="toggle-pass" onclick="togglePass()">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>
                <button class="btn" type="submit"><i class="fas fa-save"></i> Save Password</button>
            </form>
        </div>
    </main>

    <footer>
        <p><i class="fas fa-shield-halved"></i> Passwords are stored locally in your browser only — never sent to any server.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        function togglePass() {
            const inp = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (inp.type === 'password') { inp.type = 'text'; icon.classList.replace('fa-eye','fa-eye-slash'); }
            else { inp.type = 'password'; icon.classList.replace('fa-eye-slash','fa-eye'); }
        }
    </script>
</body>
</html>
