<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Car</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23f97316'/%3E%3Cellipse cx='16' cy='18' rx='13' ry='6' fill='%23c2410c'/%3E%3Cellipse cx='16' cy='15' rx='12' ry='7' fill='%23fb923c'/%3E%3Ccircle cx='9' cy='23' r='3.5' fill='%23111'/%3E%3Ccircle cx='23' cy='23' r='3.5' fill='%23111'/%3E%3Ccircle cx='9' cy='23' r='1.5' fill='%23888'/%3E%3Ccircle cx='23' cy='23' r='1.5' fill='%23888'/%3E%3C/svg%3E" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-left">
      <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 17H3a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h1l2-4h10l2 4h1a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2"/>
        <circle cx="7.5" cy="17" r="2.5"/><circle cx="16.5" cy="17" r="2.5"/>
      </svg>
      <span class="header-title">Animated Car</span>
    </div>

    <div class="header-right">
      <!-- Weather -->
      <button class="hdr-btn" id="rainBtn" title="Toggle Rain (R)">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M16.5 7a4.5 4.5 0 10-8.95-.8A4 4 0 103 10h13.5a3 3 0 000-3z M7 14l-1 3m3-3l-1 3m3-3l-1 3m3-3l-1 3"/></svg>
        Rain
      </button>

      <!-- Night toggle -->
      <button class="hdr-btn" id="nightBtn" title="Toggle Night (N)">
        <svg id="nightIcon" viewBox="0 0 20 20" fill="currentColor"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
        Night
      </button>

      <!-- Honk -->
      <button class="hdr-btn accent-btn" id="hornBtn" title="Honk! (Space)">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z"/></svg>
        Honk!
      </button>
    </div>
  </header>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-speed">
      <span class="speed-num" id="speedDisplay">60</span>
      <span class="speed-unit">km/h</span>
    </div>
    <div class="hud-bar-row">
      <button class="spd-btn" id="spdDown">−</button>
      <div class="hud-bar"><div class="hud-fill" id="speedFill"></div></div>
      <button class="spd-btn" id="spdUp">+</button>
    </div>
    <div class="hud-labels"><span>Slow</span><span>Fast</span></div>
    <div class="hud-gear" id="gearDisplay">3rd</div>

    <!-- Turbo -->
    <button class="turbo-btn" id="turboBtn" title="Turbo Boost! (T)">
      <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z"/></svg>
      Turbo
    </button>

    <!-- Shortcuts hint -->
    <div class="shortcuts">
      <span>↑↓ Speed</span>
      <span>N Night</span>
      <span>R Rain</span>
      <span>T Turbo</span>
      <span>Space Honk</span>
    </div>
  </div>

  <!-- Scene -->
  <div class="scene" id="scene">

    <!-- Night overlay -->
    <div class="night-overlay" id="nightOverlay"></div>

    <!-- Scrolling background (trees + hills + sky) -->
    <div class="bg-layer" id="bgLayer"></div>

    <!-- Stars (night only) -->
    <div class="stars" id="stars"></div>

    <!-- Moon -->
    <div class="moon" id="moon"></div>

    <!-- Rain container -->
    <div class="rain-container" id="rainContainer"></div>

    <!-- Road markings scrolling -->
    <div class="road-markings" id="roadMarkings"></div>

    <!-- Exhaust smoke -->
    <div class="exhaust" id="exhaustContainer"></div>

    <!-- Car -->
    <div class="car-wrap" id="carWrap">
      <div class="headlight-beam" id="headlightBeam"></div>
      <img class="car-img" id="carImg" src="car_new.png" alt="car" />
      <!-- Spinning wheel overlays -->
      <div class="wheel-overlay back-wheel"  id="backWheel"></div>
      <div class="wheel-overlay front-wheel" id="frontWheel"></div>
    </div>

  </div>

  <script src="script.js"></script>
<!-- Back to All Projects -->
<a id="back-to-all" href="../index.html" style="position:fixed;bottom:16px;left:16px;z-index:99999;display:inline-flex;align-items:center;gap:6px;padding:7px 13px;background:rgba(7,7,14,0.88);color:#c4b5fd;border:1px solid rgba(167,139,250,0.3);border-radius:20px;font-size:0.72rem;font-weight:700;text-decoration:none;backdrop-filter:blur(12px);font-family:system-ui,sans-serif;transition:all .2s;white-space:nowrap;" onmouseover="this.style.background='rgba(124,58,237,0.25)';this.style.borderColor='rgba(167,139,250,0.55)'" onmouseout="this.style.background='rgba(7,7,14,0.88)';this.style.borderColor='rgba(167,139,250,0.3)'"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>All Projects</a>
</body>
</html>
